# Data Module Configuration
# SMT Analytics API settings and data access parameters

api:
  #Job ID
  job_id: 3653

  # Connection Settings
  timeout: 30
  max_retries: 3

cache:
  # Cache metadata to reduce API calls
  enabled: true
  ttl_seconds: 3600
  max_size_mb: 100

validation:
  # Data quality validation
  check_ranges: true
  flag_outliers: true
  outlier_std_devs: 3.0

sensor_mapping:
  # Keywords to identify sensor types from API names
  temperature_keywords:
    - "tmp"
    - "temp"
    - "temperature"
    - "int_tmp" 
  
  humidity_keywords:
    - "humidity"
    - "rh"
    - "relative humidity"
    - "int_rh"
  
  co2_keywords:
    - "co2"
    - "carbon dioxide"
    - "carbondioxide"
  
  moisture_keywords:
    - "moisture"
    - "mc"
    - "moisture content"
    - "pmm"

  accelerometer_keywords: 
    - "accel"
    - "vibration"
    - "g-force"
    - "shake"
    - "motion"
    - "trimble"
    - "reftek"
    - "seismic"

file_data:
  base_path: "Z:/Data/COF/PeavySensorData"
  sensitivity_counts_per_g: 419430
  unit_labels:
    E2DB: "E2DB"
    E2DF: "E2DF"
    E212: "E212"
  stream_axis_map:
    "0": "Z"
    "1": "X"
    "2": "Y"
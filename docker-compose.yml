services:
  # Ollama service for LLM
  ollama:
    image: ollama/ollama:latest
    container_name: smart-building-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # Pulls Ollama model dynamically from config
  ollama-puller:
    image: ollama/ollama:latest
    container_name: ollama-puller
    volumes:
      - ollama_data:/root/.ollama
      - ./config/llm_config.yaml:/llm_config.yaml:ro
      - ./scripts/pull_model.sh:/pull_model.sh:ro
    entrypoint: /bin/sh
    command: /pull_model.sh
    environment:
      - OLLAMA_HOST=ollama:11434
    depends_on:
      - ollama

  # React/Node frontend for the 3D building viewer component
  frontend:
    image: node:18-alpine
    container_name: smart-building-frontend
    working_dir: /app
    volumes:
      - ./streamlit_3d_viewer/frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm start"
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - BROWSER=none
      - CI=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  # Streamlit application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-building-ui
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - STREAMLIT_3D_VIEWER_URL=http://localhost:3000
      - PYTHONUNBUFFERED=1
    volumes:
      - ./config:/app/config
      - ./exports:/app/exports
      - ./logs:/app/logs
    depends_on:
      ollama-puller:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ollama_data:
    driver: local
  frontend_node_modules:
    driver: local

networks:
  default:
    name: smart-building-network
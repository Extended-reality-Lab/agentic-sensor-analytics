services:
  # Ollama service for LLM
  ollama:
    image: ollama/ollama:latest
    container_name: smart-building-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # Pulls Ollama model dynamically from config
  ollama-puller:
    image: ollama/ollama:latest
    container_name: ollama-puller
    volumes:
      - ollama_data:/root/.ollama
      # Mount the config file so we can read the model name
      - ./config/llm_config.yaml:/llm_config.yaml:ro
    entrypoint: /bin/sh
    command: >
      -c '
      echo "Waiting for Ollama service to be ready...";
      sleep 10;
      while ! ollama list >/dev/null 2>&1; do
        echo "Waiting for Ollama API...";
        sleep 3;
      done;
      echo "Ollama is ready!";
      MODEL=$$(grep "model_name:" /llm_config.yaml | sed "s/.*model_name: *[\"'\'']*//;s/[\"'\''].*//");
      echo "Config file requests model: $$MODEL";
      if [ -n "$$MODEL" ]; then
        echo "Pulling model: $$MODEL";
        ollama pull $$MODEL;
        echo "Model $$MODEL successfully pulled!";
      else
        echo "ERROR: No model name found in config file";
        exit 1;
      fi
      '
    environment:
      - OLLAMA_HOST=ollama:11434
    depends_on:
      - ollama

  # Streamlit application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-building-ui
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - PYTHONUNBUFFERED=1
    volumes:
      - ./config:/app/config
      - ./exports:/app/exports
      - ./logs:/app/logs
    depends_on:
      ollama-puller:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ollama_data:
    driver: local

networks:
  default:
    name: smart-building-network